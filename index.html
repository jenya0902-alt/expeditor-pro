<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Expeditor Elite v15.5</title>
    <style>
        :root { --primary: #0A84FF; --bg: #000; --card-bg: #1C1C1E; --text: #FFF; --gray: #8E8E93; --border: #38383A; --danger: #FF453A; --success: #32D74B; --waze: #33CCFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); margin: 0; color: var(--text); padding-bottom: 120px; overflow-x: hidden; }
        
        header { padding: 55px 20px 15px; background: rgba(21, 21, 21, 0.9); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .sos-btn { background: linear-gradient(180deg, #FF453A 0%, #D70015 100%); color: white; padding: 10px 16px; border-radius: 12px; font-weight: 800; border: none; font-size: 0.7rem; }
        
        .tabs { display: flex; background: #1C1C1E; margin: 20px; border-radius: 14px; padding: 3px; border: 0.5px solid var(--border); }
        .tab-btn { flex: 1; border: none; background: none; padding: 12px; color: var(--gray); font-weight: 600; border-radius: 11px; font-size: 0.75rem; }
        .tab-btn.active { background: #3A3A3C; color: white; }

        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 15px; scrollbar-width: none; }
        .f-chip { background: #1C1C1E; color: var(--gray); padding: 8px 18px; border-radius: 20px; font-size: 0.75rem; border: 0.5px solid var(--border); white-space: nowrap; }
        .f-chip.active { background: var(--primary); color: white; }

        .container { padding: 0 20px; min-height: 200px; }
        .card { background: linear-gradient(145deg, #1c1c1e 0%, #161618 100%); border-radius: 22px; margin-bottom: 16px; padding: 20px; border: 0.5px solid var(--border); }
        
        .multi-route-btn { width: 100%; background: linear-gradient(135deg, #34C759 0%, #248A3D 100%); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 800; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3); }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-n { border-radius: 14px; padding: 14px; text-align: center; text-decoration: none; font-size: 0.75rem; font-weight: 700; color: white; display: flex; align-items: center; justify-content: center; border: none; }
        .b-waze { background: var(--waze); color: #000; }
        .b-go { background: var(--primary); }
        .b-walk { background: #A2845E; grid-column: span 2; }
        .b-call { background: #2C2C2E; grid-column: span 2; margin-bottom: 8px; border: 0.5px solid var(--border); }
        .b-done { background: var(--success); color: #000; grid-column: span 2; margin-top: 12px; padding: 18px; }

        .modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #1C1C1E; padding: 35px 25px 60px; border-radius: 30px 30px 0 0; z-index: 2000; border-top: 0.5px solid var(--border); box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
        input, select { width: 100%; padding: 18px; margin-bottom: 14px; border-radius: 16px; background: #2C2C2E; color: white; border: 1px solid var(--border); font-size: 1rem; outline: none; }
        .hebrew-input { direction: rtl; text-align: right; border-color: var(--primary); }

        .fab { position: fixed; bottom: 35px; right: 25px; background: var(--primary); color: white; width: 68px; height: 68px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; border: none; z-index: 1500; box-shadow: 0 8px 25px rgba(10, 132, 255, 0.4); }
        footer { text-align: center; color: #38383A; font-size: 0.6rem; margin: 40px 0; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <button class="sos-btn" onclick="window.open('https://www.google.com/maps/search/shelter', '_blank')">🛡️ УБЕЖИЩЕ</button>
    <div style="font-weight: 900; font-size: 1.1rem; color: var(--primary);">Expeditor Elite</div>
    <div style="width:36px"></div>
</header>

<div class="tabs">
    <button id="tab-tasks" class="tab-btn active" onclick="setTab('tasks')">МАРШРУТ</button>
    <button id="tab-clients" class="tab-btn" onclick="setTab('clients')">БАЗА</button>
    <button id="tab-archive" class="tab-btn" onclick="setTab('archive')">АРХИВ</button>
</div>

<div id="filter-container" class="filter-bar"></div>
<div class="container" id="main-content"></div>

<button class="fab" onclick="clickPlus()">+</button>
<footer>Jenya Ochakovski • v15.5</footer>

<div id="win-client" class="modal">
    <h3 style="text-align:center; margin-top:0;">Карточка клиента</h3>
    <input type="hidden" id="f-idx" value="-1">
    <select id="f-city">
        <option value="Ашкелон">Ашкелон</option>
        <option value="Ашдод">Ашдод</option>
        <option value="Кирьят-Гат">Кирьят-Гат</option>
        <option value="Другой">Другой город</option>
    </select>
    <input type="text" id="f-name" placeholder="Имя / Магазин">
    <input type="tel" id="f-phone" placeholder="Телефон">
    <input type="text" id="f-addr" class="hebrew-input" placeholder="Улица и дом (иврит)">
    <button class="btn-n b-go" style="width:100%; padding:20px;" onclick="save()">СОХРАНИТЬ</button>
    <button class="btn-n" style="width:100%; background:none; margin-top:10px; color:var(--gray)" onclick="closeModal()">ОТМЕНА</button>
</div>

<div id="win-order" class="modal">
    <h3 style="text-align:center; margin-top:0;">Куда едем?</h3>
    <select id="f-select"></select>
    <button class="btn-n b-go" style="width:100%; padding:20px;" onclick="add()">ДОБАВИТЬ В СПИСОК</button>
    <button class="btn-n" style="width:100%; background:none; margin-top:10px; color:var(--gray)" onclick="closeModal()">ОТМЕНА</button>
</div>

<script>
    let currentTab = 'tasks', filterCity = 'Все';
    let clients = JSON.parse(localStorage.getItem('cl_v155')) || [];
    let tasks = JSON.parse(localStorage.getItem('tk_v155')) || [];
    let archive = JSON.parse(localStorage.getItem('ar_v155')) || [];

    const closeModal = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    const openModal = (id) => { closeModal(); document.getElementById(id).style.display = 'block'; };

    function setTab(t) { 
        currentTab = t; 
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        render(); 
    }

    function setFilter(c) { filterCity = c; render(); }

    function render() {
        const cont = document.getElementById('main-content');
        const filtCont = document.getElementById('filter-container');
        
        // ОЧИСТКА ПЕРЕД ОТРИСОВКОЙ (убирает повторы)
        cont.textContent = ""; 
        filtCont.textContent = "";

        if (currentTab === 'tasks') {
            const cities = ['Все', 'Ашкелон', 'Ашдод', 'Кирьят-Гат', 'Другой'];
            filtCont.innerHTML = cities.map(c => `<button class="f-chip ${filterCity === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`).join('');
            
            let list = filterCity === 'Все' ? tasks : tasks.filter(t => t.city === filterCity);
            
            if (list.length > 0) {
                const multiBtn = document.createElement('button');
                multiBtn.className = 'multi-route-btn';
                multiBtn.innerText = `🗺️ ВЕСЬ МАРШРУТ ОТ МЕНЯ (${list.length})`;
                multiBtn.onclick = () => {
                    const stops = list.map(t => encodeURIComponent(t.a + " " + t.city)).join('/');
                    window.open(`https://www.google.com/maps/dir/My+Location/${stops}`, '_blank');
                };
                cont.appendChild(multiBtn);
            }

            list.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <b>${t.n}</b>
                        <button onclick="delTask(${t.id})" style="color:var(--danger); background:none; border:none; font-size:1.2rem;">✕</button>
                    </div>
                    <div dir="rtl" style="text-align:right; color:var(--gray); margin:12px 0; font-size:1.1rem;">${t.a} (${t.city})</div>
                    <div class="nav-grid">
                        <a href="tel:${t.ph}" class="btn-n b-call">📞 ЗВОНОК</a>
                        <a href="waze://?q=${encodeURIComponent(t.a + ' ' + t.city)}&navigate=yes" class="btn-n b-waze">WAZE</a>
                        <a href="https://www.google.com/maps/dir/My+Location/${encodeURIComponent(t.a + ' ' + t.city)}" target="_blank" class="btn-n b-go">GOOGLE</a>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(t.a + ' ' + t.city)}&travelmode=walking" target="_blank" class="btn-n b-walk">🚶 ПЕШКОМ</a>
                        <button class="btn-n b-done" onclick="done(${t.id})">✅ ДОСТАВЛЕНО</button>
                    </div>`;
                cont.appendChild(card);
            });
        } else if (currentTab === 'clients') {
            clients.forEach((c, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.display = "flex";
                card.style.justifyContent = "space-between";
                card.innerHTML = `<div><b>${c.name}</b><br><small dir="rtl" style="color:var(--gray)">${c.addr} (${c.city})</small></div>
                    <div style="display:flex; gap:15px;"><button onclick="edit(${i})" style="background:none; border:none; font-size:1.2rem;">✏️</button>
                    <button onclick="del(${i})" style="background:none; border:none; font-size:1.2rem;">🗑️</button></div>`;
                cont.appendChild(card);
            });
        } else {
            archive.slice().reverse().forEach(a => {
                const card = document.createElement('div');
                card.className = 'card'; card.style.opacity = "0.5";
                card.innerHTML = `<b>${a.n}</b><br><small dir="rtl">${a.a}</small>`;
                cont.appendChild(card);
            });
        }
    }

    function clickPlus() {
        if (currentTab === 'clients') {
            document.getElementById('f-idx').value = "-1";
            document.getElementById('f-name').value = "";
            document.getElementById('f-phone').value = "";
            document.getElementById('f-addr').value = "";
            openModal('win-client');
        } else {
            if (!clients.length) return alert("База пуста!");
            document.getElementById('f-select').innerHTML = clients.map((c, i) => `<option value="${i}">[${c.city}] ${c.name}</option>`).join('');
            openModal('win-order');
        }
    }

    function save() {
        const n = document.getElementById('f-name').value, a = document.getElementById('f-addr').value, 
              ph = document.getElementById('f-phone').value, city = document.getElementById('f-city').value,
              idx = parseInt(document.getElementById('f-idx').value);
        if (!n || !a) return alert("Заполни имя и адрес!");
        const obj = {name:n, addr:a, phone:ph, city:city};
        if (idx > -1) clients[idx] = obj; else clients.push(obj);
        localStorage.setItem('cl_v155', JSON.stringify(clients)); closeModal(); render();
    }

    function add() {
        const c = clients[document.getElementById('f-select').value];
        tasks.push({id: Date.now(), n: c.name, a: c.addr, city: c.city, ph: c.phone});
        localStorage.setItem('tk_v155', JSON.stringify(tasks)); closeModal(); render();
    }

    function delTask(id) { tasks = tasks.filter(t => t.id !== id); localStorage.setItem('tk_v155', JSON.stringify(tasks)); render(); }
    function done(id) { let t = tasks.find(x => x.id === id); archive.push(t); tasks = tasks.filter(x => x.id !== id); localStorage.setItem('tk_v155', JSON.stringify(tasks)); localStorage.setItem('ar_v155', JSON.stringify(archive)); render(); }
    function edit(i) { const c = clients[i]; document.getElementById('f-idx').value = i; document.getElementById('f-name').value = c.name; document.getElementById('f-phone').value = c.phone; document.getElementById('f-addr').value = c.addr; document.getElementById('f-city').value = c.city; openModal('win-client'); }
    function del(i) { if(confirm("Удалить клиента?")) { clients.splice(i,1); localStorage.setItem('cl_v155', JSON.stringify(clients)); render(); } }

    render();
</script>
</body>
</html>
