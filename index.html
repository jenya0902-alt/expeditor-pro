<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expeditor">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991231.png">

    <title>Expeditor Cloud v19.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #0A84FF; --bg: #000; --card-bg: #1C1C1E; --text: #FFF; --gray: #8E8E93; --border: #38383A; --danger: #FF453A; --success: #32D74B; --waze: #33CCFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        
        body { background: var(--bg); margin: 0; color: var(--text); padding-bottom: 120px; overflow-x: hidden; padding-top: env(safe-area-inset-top); }
        
        #alert-status { 
            background: #151515; padding: 15px 10px; text-align: center; font-size: 0.85rem; 
            font-weight: 800; border-bottom: 1px solid var(--border); color: var(--success); 
            position: sticky; top: 0; z-index: 2000; text-transform: uppercase; letter-spacing: 1px;
        }
        .alert-active { background: var(--danger) !important; color: white !important; animation: blink 0.6s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        header { padding: 15px 20px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 50px; z-index: 1000; }
        .logo-text { font-weight: 900; font-size: 1.3rem; color: white; }
        
        .route-all-btn { background: #34C759; color: #000; padding: 8px 12px; border-radius: 10px; font-weight: 800; font-size: 0.7rem; text-decoration: none; border: none; }
        .sos-btn { background: rgba(255, 69, 58, 0.2); color: var(--danger); padding: 8px 15px; border-radius: 10px; font-weight: 800; border: 1px solid var(--danger); font-size: 0.7rem; text-decoration: none; }

        .tabs { display: flex; background: #1C1C1E; margin: 15px; border-radius: 14px; padding: 3px; border: 0.5px solid var(--border); }
        .tab-btn { flex: 1; border: none; background: none; padding: 12px; color: var(--gray); font-weight: 600; border-radius: 11px; font-size: 0.7rem; }
        .tab-btn.active { background: #3A3A3C; color: white; }

        .container { padding: 0 15px; }
        .card { background: #1C1C1E; border-radius: 24px; margin-bottom: 15px; padding: 20px; border: 0.5px solid var(--border); position: relative; }
        
        .help-title { color: var(--primary); font-weight: 800; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .help-text { color: #D1D1D6; font-size: 0.9rem; line-height: 1.4; }
        
        .move-controls { display: flex; gap: 8px; margin-bottom: 12px; }
        .move-btn { background: #2C2C2E; border: 1px solid var(--border); color: white; width: 45px; height: 38px; border-radius: 10px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-n { border-radius: 14px; padding: 16px; text-decoration: none; font-size: 0.75rem; font-weight: 700; color: white; display: flex; align-items: center; justify-content: center; border: none; }
        .b-waze { background: var(--waze); color: #000; }
        .b-go { background: var(--primary); }
        .b-call { background: #2C2C2E; grid-column: span 2; border: 0.5px solid var(--border); }
        .b-done { background: var(--success); color: #000; grid-column: span 2; margin-top: 10px; }

        .modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #1C1C1E; padding: 20px 20px 40px; border-radius: 30px 30px 0 0; z-index: 3000; border-top: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; background: #2C2C2E; color: white; border: 1px solid var(--border); font-size: 1rem; }
        .city-chip { background: #2C2C2E; border: 1px solid var(--border); color: var(--gray); padding: 10px 15px; border-radius: 12px; font-size: 0.75rem; margin-right: 5px; border: none; }
        .city-chip.active { background: var(--primary); color: white; }

        .fab { position: fixed; bottom: 35px; right: 25px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; border: none; z-index: 1500; }
        .hebrew { direction: rtl; text-align: right; }
    </style>
</head>
<body onclick="initAudio()">

<div id="alert-status">● ОБЛАКО...</div>

<header>
    <button class="route-all-btn" onclick="openFullRoute()">🗺️ ВЕСЬ МАРШРУТ</button>
    <div class="logo-text">Expeditor</div>
    <a href="https://www.google.com/maps/search/shelter" class="sos-btn" target="_blank">🛡️ SOS</a>
</header>

<div class="tabs">
    <button id="t-tasks" class="tab-btn active" onclick="setTab('tasks')">МАРШРУТ</button>
    <button id="t-clients" class="tab-btn" onclick="setTab('clients')">БАЗА</button>
    <button id="t-archive" class="tab-btn" onclick="setTab('archive')">АРХИВ</button>
    <button id="t-help" class="tab-btn" onclick="setTab('help')">📖 ПОМОЩЬ</button>
</div>

<div id="filter-area" style="display: flex; gap: 8px; overflow-x: auto; padding: 0 15px 15px; scrollbar-width: none;"></div>
<div id="main-content" class="container"></div>

<button id="fab-plus" class="fab" onclick="clickPlus()">+</button>

<div id="win-order" class="modal">
    <h3 style="text-align:center; margin-top:0;">Добавить в план</h3>
    <div style="display:flex; gap:5px; overflow-x:auto; margin-bottom:15px;" id="order-city-selector"></div>
    <select id="f-select" size="6" style="height: auto;"></select>
    <button class="btn-n b-go" style="width:100%; padding:20px;" onclick="addTaskCloud()">ДОБАВИТЬ В МАРШРУТ</button>
    <button class="btn-n" style="width:100%; background:none; margin:10px 0; color:var(--gray)" onclick="closeModal()">ЗАКРЫТЬ</button>
</div>

<div id="win-client" class="modal">
    <h3 style="text-align:center; margin-top:0;">Новый клиент</h3>
    <input type="hidden" id="f-id" value="">
    <select id="f-city"><option>Ашкелон</option><option>Ашдод</option><option>Кирьят-Гат</option><option>Другой</option></select>
    <input type="text" id="f-name" placeholder="Название магазина">
    <input type="tel" id="f-phone" placeholder="Телефон">
    <input type="text" id="f-addr" class="hebrew" placeholder="Адрес (иврит)">
    <button class="btn-n b-go" style="width:100%; padding:20px;" onclick="saveClientCloud()">СОХРАНИТЬ В ОБЛАКО</button>
    <button class="btn-n" style="width:100%; background:none; margin:10px 0; color:var(--gray)" onclick="closeModal()">ОТМЕНА</button>
</div>

<script>
    // --- ДАННЫЕ SUPABASE ---
    const S_URL = 'https://psrsaqpebxwujzsphadt.supabase.co'; 
    const S_KEY = 'sb_publishable_O5lq4QFB_jM1oOtcsBghjw_IGMSAauy';
    const supabase = window.supabase.createClient(S_URL, S_KEY);

    let activeTab = 'tasks', filterCity = 'Все', modalCity = 'Ашкелон', audioCtx = null;
    let clients = [], tasks = [], archive = [];
    const citiesList = ['Ашкелон', 'Ашдод', 'Кирьят-Гат', 'Другой'];

    // Синхронизация с облаком
    async function sync() {
        const { data: cl } = await supabase.from('clients').select('*').order('name');
        clients = cl || [];

        const { data: tk } = await supabase.from('tasks').select('*').eq('done', false).order('created_at');
        tasks = tk || [];

        const { data: ar } = await supabase.from('tasks').select('*').eq('done', true).order('created_at', {ascending: false}).limit(15);
        archive = ar || [];

        render();
    }

    async function checkAlerts() {
        const status = document.getElementById('alert-status');
        try {
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.oref.org.il/WarningMessages/History/AlertsHistory.json') + '&t=' + Date.now());
            const json = await response.json();
            const alerts = JSON.parse(json.contents);
            const danger = alerts.find(a => ["אשקלון", "אשדוד", "קרית גת"].includes(a.data));
            if (danger) {
                status.innerHTML = `🚨 ЦЕВА АДОМ: ${danger.data}!`;
                status.classList.add('alert-active');
            } else {
                status.innerHTML = "● НЕБО ЧИСТОЕ (ONLINE)";
                status.classList.remove('alert-active');
            }
        } catch (e) { status.innerHTML = "● МОНИТОРИНГ АКТИВЕН"; }
    }
    setInterval(checkAlerts, 5000);

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function setTab(t) { 
        activeTab = t; 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 't-'+t));
        render(); 
    }

    function openFullRoute() {
        let list = tasks.filter(t => filterCity === 'Все' || t.city === filterCity);
        if (list.length === 0) return alert("Список пуст.");
        let dest = encodeURIComponent(list[list.length-1].a + " " + list[list.length-1].city);
        let baseUrl = "https://www.google.com/maps/dir/?api=1&destination=" + dest;
        if (list.length > 1) {
            let waypoints = list.slice(0, -1).map(t => encodeURIComponent(t.a + " " + t.city)).join('|');
            baseUrl += "&waypoints=" + waypoints;
        }
        window.open(baseUrl, '_blank');
    }

    function render() {
        const cont = document.getElementById('main-content'), filt = document.getElementById('filter-area');
        cont.innerHTML = ""; filt.innerHTML = "";

        if (activeTab === 'tasks') {
            filt.innerHTML = ['Все', ...citiesList].map(c => `<button class="city-chip ${filterCity === c ? 'active' : ''}" onclick="filterCity='${c}'; render();">${c}</button>`).join('');
            let list = tasks.filter(t => filterCity === 'Все' || t.city === filterCity);
            
            cont.innerHTML += list.map((t) => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="color:var(--gray); font-size:0.7rem">Маршрут</span>
                        <button onclick="delTaskCloud(${t.id})" style="background:none; border:none; color:var(--gray); font-size:1.5rem;">×</button>
                    </div>
                    <b>${t.n}</b>
                    <div class="hebrew" style="color:var(--gray); margin:10px 0;">${t.a} (${t.city})</div>
                    <div class="nav-grid">
                        <a href="tel:${t.ph}" class="btn-n b-call">📞 ПОЗВОНИТЬ</a>
                        <a href="waze://?q=${encodeURIComponent(t.a+' '+t.city)}&navigate=yes" class="btn-n b-waze">WAZE</a>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.a+' '+t.city)}" target="_blank" class="btn-n b-go">GOOGLE</a>
                        <button class="btn-n b-done" onclick="markDoneCloud(${t.id})">✅ ГОТОВО</button>
                    </div>
                </div>`).join('');
        } else if (activeTab === 'clients') {
            cont.innerHTML = clients.map((c) => `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${c.name}</b><br><small class="hebrew" style="color:var(--gray)">${c.addr} (${c.city})</small></div>
                <button onclick="editClient('${c.id}')" style="background:none; border:none; font-size:1.2rem;">✏️</button></div>`).join('');
        } else if (activeTab === 'archive') {
            cont.innerHTML = archive.map(a => `<div class="card" style="opacity:0.5;"><b>${a.n}</b><br>${a.a}</div>`).join('');
        } else if (activeTab === 'help') {
            cont.innerHTML = `<div class="card"><div class="help-title">☁️ Облако</div><div class="help-text">Все данные теперь общие. Ты и муж видите одно и то же в реальном времени.</div></div>`;
        }
    }

    async function saveClientCloud() {
        const id = document.getElementById('f-id').value;
        const payload = {
            name: document.getElementById('f-name').value,
            addr: document.getElementById('f-addr').value,
            phone: document.getElementById('f-phone').value,
            city: document.getElementById('f-city').value
        };
        if (!payload.name || !payload.addr) return;
        
        if (id) await supabase.from('clients').update(payload).eq('id', id);
        else await supabase.from('clients').insert([payload]);
        
        closeModal(); sync();
    }

    async function addTaskCloud() {
        const val = document.getElementById('f-select').value;
        if (val === "") return;
        const c = clients.find(x => x.id == val);
        await supabase.from('tasks').insert([{ n: c.name, a: c.addr, ph: c.phone, city: c.city, done: false }]);
        closeModal(); sync();
    }

    async function markDoneCloud(id) {
        await supabase.from('tasks').update({ done: true }).eq('id', id);
        sync();
    }

    async function delTaskCloud(id) {
        await supabase.from('tasks').delete().eq('id', id);
        sync();
    }

    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    function clickPlus() { 
        if(activeTab==='clients') { 
            document.getElementById('f-id').value=""; 
            document.getElementById('f-name').value=""; document.getElementById('f-phone').value=""; document.getElementById('f-addr').value="";
            document.getElementById('win-client').style.display='block'; 
        } else { 
            updateOrderModalCities(); 
            document.getElementById('win-order').style.display='block'; 
        } 
    }
    
    function updateOrderModalCities() {
        const selector = document.getElementById('order-city-selector');
        selector.innerHTML = citiesList.map(c => `<button class="city-chip ${modalCity === c ? 'active' : ''}" onclick="modalCity='${c}'; updateOrderModalCities();">${c}</button>`).join('');
        const filtered = clients.filter(c => c.city === modalCity);
        const select = document.getElementById('f-select');
        select.innerHTML = filtered.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function editClient(id) { 
        const c = clients.find(x => x.id == id);
        document.getElementById('f-id').value = id; 
        document.getElementById('f-name').value = c.name; 
        document.getElementById('f-phone').value = c.phone; 
        document.getElementById('f-addr').value = c.addr; 
        document.getElementById('f-city').value = c.city; 
        document.getElementById('win-client').style.display = 'block'; 
    }

    sync();
    checkAlerts();
</script>
</body>
</html>
