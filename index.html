<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expeditor">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991231.png">

    <title>Expeditor Elite v16.9</title>
    <style>
        :root { --primary: #0A84FF; --bg: #000; --card-bg: #1C1C1E; --text: #FFF; --gray: #8E8E93; --border: #38383A; --danger: #FF453A; --success: #32D74B; --waze: #33CCFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); margin: 0; color: var(--text); padding-bottom: 120px; overflow-x: hidden; }
        
        /* ПОДСКАЗКА ДЛЯ УСТАНОВКИ */
        #pwa-install { display: none; background: var(--primary); color: white; padding: 15px; margin: 15px; border-radius: 18px; font-size: 0.8rem; text-align: center; font-weight: 600; box-shadow: 0 10px 20px rgba(10, 132, 255, 0.3); }

        #alert-status { background: #151515; padding: 10px; text-align: center; font-size: 0.7rem; font-weight: 800; border-bottom: 0.5px solid var(--border); color: var(--success); position: sticky; top: 0; z-index: 1100; letter-spacing: 1px; }
        .alert-active { background: var(--danger) !important; color: white !important; animation: blink 0.6s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        header { padding: 25px 20px 15px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 37px; z-index: 1000; }
        .logo-text { font-weight: 900; font-size: 1.3rem; background: linear-gradient(180deg, #FFF 0%, #AAA 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sos-btn { background: rgba(255, 69, 58, 0.2); color: var(--danger); padding: 8px 15px; border-radius: 10px; font-weight: 800; border: 1px solid var(--danger); font-size: 0.7rem; text-decoration: none; }
        
        .tabs { display: flex; background: #1C1C1E; margin: 15px; border-radius: 14px; padding: 3px; border: 0.5px solid var(--border); }
        .tab-btn { flex: 1; border: none; background: none; padding: 10px; color: var(--gray); font-weight: 600; border-radius: 11px; font-size: 0.65rem; }
        .tab-btn.active { background: #3A3A3C; color: white; }

        .container { padding: 0 15px; }
        .card { background: linear-gradient(145deg, #1c1c1e 0%, #161618 100%); border-radius: 24px; margin-bottom: 15px; padding: 20px; border: 0.5px solid var(--border); }
        
        .move-controls { display: flex; gap: 8px; margin-bottom: 10px; }
        .move-btn { background: #2C2C2E; border: 0.5px solid var(--border); color: white; width: 40px; height: 35px; border-radius: 10px; font-weight: bold; }

        .multi-route-btn { width: 100%; background: linear-gradient(135deg, #34C759 0%, #248A3D 100%); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 800; margin-bottom: 20px; font-size: 0.85rem; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-n { border-radius: 14px; padding: 14px; text-decoration: none; font-size: 0.75rem; font-weight: 700; color: white; display: flex; align-items: center; justify-content: center; border: none; }
        .b-waze { background: var(--waze); color: #000; }
        .b-go { background: var(--primary); }
        .b-call { background: #2C2C2E; grid-column: span 2; border: 0.5px solid var(--border); }
        .b-done { background: var(--success); color: #000; grid-column: span 2; margin-top: 10px; padding: 18px; }

        .modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #1C1C1E; padding: 20px 20px 40px; border-radius: 30px 30px 0 0; z-index: 2000; border-top: 0.5px solid var(--border); max-height: 90vh; overflow-y: auto; }
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; background: #2C2C2E; color: white; border: 1px solid var(--border); font-size: 1rem; }
        .city-chip { background: #2C2C2E; border: 1px solid var(--border); color: var(--gray); padding: 8px 12px; border-radius: 10px; font-size: 0.7rem; white-space: nowrap; margin-right: 5px; }
        .city-chip.active { background: var(--primary); color: white; }

        .fab { position: fixed; bottom: 35px; right: 25px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; border: none; z-index: 1500; box-shadow: 0 10px 25px rgba(10, 132, 255, 0.4); }
        .hebrew { direction: rtl; text-align: right; }
    </style>
</head>
<body onclick="initAudio()">

<div id="alert-status">ОБЛАКО ПОДКЛЮЧЕНО...</div>

<header>
    <a href="https://www.google.com/maps/search/public+shelter/@31.668,34.574,14z" class="sos-btn" target="_blank">🛡️ КАРТА SOS</a>
    <div class="logo-text">Expeditor</div>
    <div style="width:60px"></div>
</header>

<div id="pwa-install" onclick="this.style.display='none'">
    Нажми <img src="https://img.icons8.com/ios/50/ffffff/share-rounded.png" width="15" style="vertical-align: middle;"> «Поделиться», затем <br><b>«На экран „Домой“»</b> для работы в режиме приложения.
</div>

<div class="tabs">
    <button id="t-tasks" class="tab-btn active" onclick="setTab('tasks')">МАРШРУТ</button>
    <button id="t-clients" class="tab-btn" onclick="setTab('clients')">БАЗА</button>
    <button id="t-archive" class="tab-btn" onclick="setTab('archive')">АРХИВ</button>
    <button id="t-help" class="tab-btn" onclick="setTab('help')">📖 ПОМОЩЬ</button>
</div>

<div id="filter-area" style="display: flex; gap: 8px; overflow-x: auto; padding: 0 15px 15px; scrollbar-width: none;"></div>
<div id="main-content" class="container"></div>

<button id="fab-plus" class="fab" onclick="clickPlus()">+</button>

<div id="win-order" class="modal">
    <h3 style="text-align:center; margin-top:0;">Добавить город</h3>
    <div style="display:flex; gap:5px; overflow-x:auto; margin-bottom:15px;" id="order-city-selector"></div>
    <select id="f-select" size="5" style="height: auto;"></select>
    <button class="btn-n b-go" style="width:100%; padding:20px;" onclick="addTask()">В МАРШРУТ</button>
    <button class="btn-n" style="width:100%; background:none; margin:10px 0; color:var(--gray)" onclick="closeModal()">ЗАКРЫТЬ</button>
</div>

<div id="win-client" class="modal">
    <h3 style="text-align:center; margin-top:0;">Клиент</h3>
    <input type="hidden" id="f-idx" value="-1">
    <select id="f-city"><option>Ашкелон</option><option>Ашдод</option><option>Кирьят-Гат</option><option>Другой</option></select>
    <input type="text" id="f-name" placeholder="Магазин">
    <input type="tel" id="f-phone" placeholder="Телефон">
    <input type="text" id="f-addr" class="hebrew" placeholder="Адрес (иврит)">
    <button class="btn-n b-go" style="width:100%; padding:20px;" onclick="saveClient()">СОХРАНИТЬ</button>
    <button class="btn-n" style="width:100%; background:none; margin:10px 0; color:var(--gray)" onclick="closeModal()">ОТМЕНА</button>
</div>

<script>
    let activeTab = 'tasks', filterCity = 'Все', modalCity = 'Ашкелон', audioCtx = null;
    let clients = JSON.parse(localStorage.getItem('cl_v169')) || [];
    let tasks = JSON.parse(localStorage.getItem('tk_v169')) || [];
    let archive = JSON.parse(localStorage.getItem('ar_v169')) || [];

    const citiesList = ['Ашкелон', 'Ашдод', 'Кирьят-Гат', 'Другой'];

    // Проверка, запущено ли как приложение
    if (!window.navigator.standalone) {
        document.getElementById('pwa-install').style.display = 'block';
    }

    async function checkAlerts() {
        const status = document.getElementById('alert-status');
        try {
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.oref.org.il/WarningMessages/History/AlertsHistory.json') + '&t=' + Date.now());
            const json = await response.json();
            const alerts = JSON.parse(json.contents);
            const danger = alerts.find(a => ["אשקלון", "אשדוד", "קרית גת"].includes(a.data));
            if (danger) {
                status.innerHTML = `🚨 ТРЕВОГА: ${danger.data}!`;
                status.classList.add('alert-active');
                playSiren();
            } else {
                status.innerHTML = "● НЕБО ЧИСТОЕ (ONLINE)";
                status.classList.remove('alert-active');
            }
        } catch (e) { status.innerHTML = "● МОНИТОРИНГ АКТИВЕН"; }
    }
    setInterval(checkAlerts, 5000);

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSiren() { if(audioCtx) { /* звук сирены */ } }

    function setTab(t) { 
        activeTab = t; 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 't-'+t));
        render(); 
    }

    function moveTask(index, dir) {
        let newIndex = index + dir;
        if (newIndex >= 0 && newIndex < tasks.length) {
            [tasks[index], tasks[newIndex]] = [tasks[newIndex], tasks[index]];
            localStorage.setItem('tk_v169', JSON.stringify(tasks));
            render();
        }
    }

    function render() {
        const cont = document.getElementById('main-content'), filt = document.getElementById('filter-area');
        cont.innerHTML = ""; filt.innerHTML = "";

        if (activeTab === 'tasks') {
            filt.innerHTML = ['Все', ...citiesList].map(c => `<button class="city-chip ${filterCity === c ? 'active' : ''}" onclick="filterCity='${c}'; render();">${c}</button>`).join('');
            
            let list = tasks.map((t, i) => ({...t, origIdx: i})).filter(t => filterCity === 'Все' || t.city === filterCity);
            
            if (list.length > 0) {
                const b = document.createElement('button'); b.className = 'multi-route-btn'; b.innerText = `🗺️ ОБЩИЙ МАРШРУТ (${list.length})`;
                b.onclick = () => window.open(`https://www.google.com/maps/dir/` + list.map(t => encodeURIComponent(t.a + " " + t.city)).join('/'), '_blank');
                cont.appendChild(b);
            }

            cont.innerHTML += list.map((t) => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <div class="move-controls">
                            ${t.origIdx > 0 ? `<button class="move-btn" onclick="moveTask(${t.origIdx}, -1)">↑</button>` : ''}
                            ${t.origIdx < tasks.length - 1 ? `<button class="move-btn" onclick="moveTask(${t.origIdx}, 1)">↓</button>` : ''}
                        </div>
                        <button onclick="delTask(${t.id})" style="background:none; border:none; color:var(--gray); font-size:1.5rem;">×</button>
                    </div>
                    <b>${t.n}</b>
                    <div class="hebrew" style="color:var(--gray); margin:10px 0;">${t.a} (${t.city})</div>
                    <div class="nav-grid">
                        <a href="tel:${t.ph}" class="btn-n b-call">📞 ПОЗВОНИТЬ</a>
                        <a href="waze://?q=${encodeURIComponent(t.a+' '+t.city)}&navigate=yes" class="btn-n b-waze">WAZE</a>
                        <a href="https://www.google.com/maps/search/${encodeURIComponent(t.a+' '+t.city)}" target="_blank" class="btn-n b-go">GOOGLE</a>
                        <button class="btn-n b-done" onclick="done(${t.id})">✅ ГОТОВО</button>
                    </div>
                </div>`).join('');
        } else if (activeTab === 'clients') {
            cont.innerHTML = clients.map((c, i) => `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${c.name}</b><br><small class="hebrew" style="color:var(--gray)">${c.addr} (${c.city})</small></div>
                <div style="display:flex; gap:15px;"><button onclick="editClient(${i})" style="background:none; border:none; font-size:1.4rem;">✏️</button><button onclick="delClient(${i})" style="background:none; border:none; font-size:1.4rem;">🗑️</button></div></div>`).join('');
        } else if (activeTab === 'help') {
            cont.innerHTML = `<div class="card"><b>Как сделать приложением:</b><br>1. Открой этот сайт в Safari.<br>2. Нажми кнопку "Поделиться" (квадрат со стрелкой).<br>3. Выбери пункт <b>"На экран Домой"</b>.<br>4. Теперь запускай с иконки как обычное приложение.</div>`;
        } else {
            cont.innerHTML = archive.slice().reverse().map(a => `<div class="card" style="opacity:0.4;"><b>${a.n}</b><br><small>${a.a}</small></div>`).join('');
        }
    }

    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function clickPlus() { if(activeTab==='clients') { document.getElementById('f-idx').value="-1"; document.getElementById('win-client').style.display='block'; } else { updateOrderModalCities(); document.getElementById('win-order').style.display='block'; } }
    
    function updateOrderModalCities() {
        const selector = document.getElementById('order-city-selector');
        selector.innerHTML = citiesList.map(c => `<button class="city-chip ${modalCity === c ? 'active' : ''}" onclick="modalCity='${c}'; updateOrderModalCities();">${c}</button>`).join('');
        const filtered = clients.filter(c => c.city === modalCity);
        const select = document.getElementById('f-select');
        select.innerHTML = filtered.map(c => `<option value="${clients.indexOf(c)}">${c.name}</option>`).join('');
    }

    function saveClient() {
        const n = document.getElementById('f-name').value, a = document.getElementById('f-addr').value, ph = document.getElementById('f-phone').value, city = document.getElementById('f-city').value, idx = parseInt(document.getElementById('f-idx').value);
        if (!n || !a) return;
        if (idx > -1) clients[idx] = {name:n, addr:a, phone:ph, city:city}; else clients.push({name:n, addr:a, phone:ph, city:city});
        localStorage.setItem('cl_v169', JSON.stringify(clients)); closeModal(); render();
    }

    function addTask() {
        const val = document.getElementById('f-select').value;
        if (val==="") return;
        const c = clients[val];
        tasks.push({id: Date.now(), n: c.name, a: c.addr, city: c.city, ph: c.phone});
        localStorage.setItem('tk_v169', JSON.stringify(tasks)); closeModal(); render();
    }

    function delTask(id) { tasks = tasks.filter(t => t.id !== id); localStorage.setItem('tk_v169', JSON.stringify(tasks)); render(); }
    function done(id) { let t = tasks.find(x => x.id === id); archive.push(t); tasks = tasks.filter(x => x.id !== id); localStorage.setItem('tk_v169', JSON.stringify(tasks)); localStorage.setItem('ar_v169', JSON.stringify(archive)); render(); }
    function editClient(i) { const c = clients[i]; document.getElementById('f-idx').value = i; document.getElementById('f-name').value = c.name; document.getElementById('f-phone').value = c.phone; document.getElementById('f-addr').value = c.addr; document.getElementById('f-city').value = c.city; document.getElementById('win-client').style.display = 'block'; }
    function delClient(i) { if(confirm("Удалить?")) { clients.splice(i,1); localStorage.setItem('cl_v169', JSON.stringify(clients)); render(); } }

    render();
    checkAlerts();
</script>
</body>
</html>
