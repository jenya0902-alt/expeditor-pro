<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Expeditor Elite v14.9</title>
    <style>
        :root { 
            --primary: #0A84FF; --bg: #000; --card-bg: #1C1C1E; 
            --text: #FFF; --gray: #8E8E93; --border: #38383A; 
            --danger: #FF453A; --success: #32D74B; --waze: #33CCFF;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); margin: 0; color: var(--text); padding-bottom: 120px; }
        
        header { 
            padding: 55px 20px 15px; 
            background: rgba(21, 21, 21, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; 
        }

        .sos-btn { background: linear-gradient(180deg, #FF453A 0%, #D70015 100%); color: white; padding: 10px 16px; border-radius: 12px; font-weight: 800; font-size: 0.7rem; border: none; }
        .help-btn { background: #3A3A3C; color: white; width: 36px; height: 36px; border-radius: 50%; border: none; font-weight: bold; }

        .tabs { display: flex; background: #1C1C1E; margin: 20px; border-radius: 14px; padding: 3px; border: 0.5px solid var(--border); }
        .tab-btn { flex: 1; border: none; background: none; padding: 12px; color: var(--gray); font-weight: 600; border-radius: 11px; font-size: 0.75rem; }
        .tab-btn.active { background: #3A3A3C; color: white; }

        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 15px; scrollbar-width: none; }
        .f-chip { background: #1C1C1E; color: var(--gray); padding: 8px 18px; border-radius: 20px; font-size: 0.75rem; border: 0.5px solid var(--border); white-space: nowrap; font-weight: 600; }
        .f-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .container { padding: 0 20px; }
        .card { background: linear-gradient(145deg, #1c1c1e 0%, #161618 100%); border-radius: 22px; margin-bottom: 16px; padding: 20px; border: 0.5px solid var(--border); }
        
        /* Кнопка мульти-маршрута */
        .multi-route-btn { 
            width: 100%; background: linear-gradient(135deg, #34C759 0%, #248A3D 100%); 
            color: white; padding: 16px; border-radius: 16px; border: none; 
            font-weight: 800; font-size: 0.85rem; margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3);
        }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-n { border-radius: 14px; padding: 14px; text-align: center; text-decoration: none; font-size: 0.75rem; font-weight: 700; color: white; border: none; display: flex; align-items: center; justify-content: center; }
        .b-waze { background: var(--waze); color: #000; }
        .b-go { background: var(--primary); }
        .b-call { background: #2C2C2E; grid-column: span 2; margin-bottom: 8px; border: 0.5px solid var(--border); }
        .b-done { background: var(--success); color: #000; grid-column: span 2; margin-top: 12px; font-size: 0.85rem; padding: 18px; }

        .modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #1C1C1E; padding: 35px 25px 60px; border-radius: 30px 30px 0 0; z-index: 2000; border-top: 0.5px solid var(--border); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input, select { width: 100%; padding: 18px; margin-bottom: 14px; border-radius: 16px; background: #2C2C2E; color: white; border: 1px solid var(--border); font-size: 1rem; }
        .fab { position: fixed; bottom: 35px; right: 25px; background: var(--primary); color: white; width: 68px; height: 68px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; border: none; z-index: 1500; box-shadow: 0 8px 25px rgba(10, 132, 255, 0.4); }
        footer { text-align: center; color: #38383A; font-size: 0.6rem; margin: 40px 0; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <button class="sos-btn" onclick="window.open('https://www.google.com/maps/search/bomb+shelter', '_blank')">🛡️ УБЕЖИЩЕ</button>
    <div style="font-weight: 900; font-size: 1.1rem; color: var(--primary);">Expeditor Elite</div>
    <button class="help-btn" onclick="openModal('win-help')">?</button>
</header>

<div class="tabs">
    <button class="tab-btn active" id="t-tasks" onclick="setTab('tasks')">МАРШРУТ</button>
    <button class="tab-btn" id="t-clients" onclick="setTab('clients')">БАЗА</button>
    <button class="tab-btn" id="t-archive" onclick="setTab('archive')">АРХИВ</button>
</div>

<div id="filter-container" class="filter-bar"></div>

<div class="container" id="main-content"></div>

<button class="fab" onclick="clickPlus()">+</button>

<footer>Designed by Jenya Ochakovski • v14.9</footer>

<div id="win-help" class="modal">
    <h2 style="margin-top:0; text-align:center;">Маршрут на карте</h2>
    <p style="color:var(--gray); line-height:1.6">Нажмите <b>«ВЕСЬ МАРШРУТ»</b>, чтобы открыть все текущие точки в Google Maps одним списком.</p>
    <button class="btn-n b-go" style="width:100%; margin-top:20px; padding:20px;" onclick="closeModal()">ПОНЯТНО</button>
</div>

<div id="win-client" class="modal">
    <h3 style="margin-top:0; text-align:center;">Клиент</h3>
    <input type="hidden" id="f-idx" value="-1">
    <select id="f-city">
        <option value="Ашкелон">Ашкелон</option>
        <option value="Ашдод">Ашдод</option>
        <option value="Кирьят-Гат">Кирьят-Гат</option>
        <option value="Другой">Другой город</option>
    </select>
    <input type="text" id="f-name" placeholder="Имя">
    <input type="tel" id="f-phone" placeholder="Телефон">
    <input type="text" id="f-addr" placeholder="Улица и номер">
    <button class="btn-n b-go" style="width:100%; padding:20px;" onclick="save()">СОХРАНИТЬ</button>
    <button class="btn-n" style="width:100%; background:none; margin-top:15px; color:var(--gray)" onclick="closeModal()">ОТМЕНА</button>
</div>

<div id="win-order" class="modal">
    <h3 style="margin-top:0; text-align:center;">Добавить</h3>
    <select id="f-select"></select>
    <button class="btn-n b-go" style="width:100%; padding:20px;" onclick="add()">В СПИСОК</button>
    <button class="btn-n" style="width:100%; background:none; margin-top:15px; color:var(--gray)" onclick="closeModal()">ОТМЕНА</button>
</div>

<script>
    let tab = 'tasks';
    let filterCity = 'Все';
    let clients = JSON.parse(localStorage.getItem('cl_v149')) || [];
    let tasks = JSON.parse(localStorage.getItem('tk_v149')) || [];
    let archive = JSON.parse(localStorage.getItem('ar_v149')) || [];

    function openModal(id) { closeModal(); document.getElementById(id).style.display = 'block'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    function setTab(t) { tab = t; render(); }
    function setFilter(city) { filterCity = city; render(); }

    // ГЕНЕРАЦИЯ ССЫЛКИ НА МУЛЬТИ-МАРШРУТ
    function openFullRoute(displayTasks) {
        if(!displayTasks.length) return;
        const origin = "My+Location";
        const destinations = displayTasks.map(t => encodeURIComponent(t.a + ", " + t.city)).join('/');
        const url = `https://www.google.com/maps/dir/${origin}/${destinations}`;
        window.open(url, '_blank');
    }

    function render() {
        const cont = document.getElementById('main-content');
        const filtCont = document.getElementById('filter-container');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 't-'+tab));
        cont.innerHTML = ""; filtCont.innerHTML = "";

        if(tab === 'tasks') {
            const cities = ['Все', 'Ашкелон', 'Ашдод', 'Кирьят-Гат', 'Другой'];
            filtCont.innerHTML = cities.map(c => `<button class="f-chip ${filterCity === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`).join('');
            
            let displayTasks = filterCity === 'Все' ? tasks : tasks.filter(t => t.city === filterCity);
            
            if(displayTasks.length > 0) {
                const btn = document.createElement('button');
                btn.className = 'multi-route-btn';
                btn.innerHTML = `🗺️ ВЕСЬ МАРШРУТ (${displayTasks.length} ТОЧЕК)`;
                btn.onclick = () => openFullRoute(displayTasks);
                cont.appendChild(btn);
            }

            cont.innerHTML += displayTasks.map((t) => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <div><b style="font-size:1.2rem;">${t.n}</b><br><small style="color:var(--primary)">📍 ${t.city}</small></div>
                        <button onclick="delTask(${t.id})" style="background:#2C2C2E; border:none; color:var(--danger); width:30px; height:30px; border-radius:50%;">✕</button>
                    </div>
                    <div style="color:var(--gray); font-size:0.9rem; margin:12px 0;">🏠 ${t.a}</div>
                    <div class="nav-grid">
                        <a href="tel:${t.ph}" class="btn-n b-call">📞 ПОЗВОНИТЬ</a>
                        <a href="waze://?q=${encodeURIComponent(t.a + ' ' + t.city)}&navigate=yes" class="btn-n b-waze">WAZE</a>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.a + ' ' + t.city)}" class="btn-n b-go">MAPS</a>
                        <button class="btn-n b-done" onclick="done(${t.id})">✅ ДОСТАВЛЕНО</button>
                    </div>
                </div>`).join('');
        } else if(tab === 'clients') {
            ["Ашкелон", "Ашдод", "Кирьят-Гат", "Другой"].forEach(city => {
                let filtered = clients.filter(c => c.city === city);
                if(filtered.length > 0) {
                    cont.innerHTML += `<div style="color:var(--primary); font-size:0.7rem; font-weight:800; margin:10px 0;">${city.toUpperCase()}</div>`;
                    filtered.forEach(c => {
                        let idx = clients.indexOf(c);
                        cont.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
                            <div><b>${c.name}</b><br><small style="color:var(--gray)">${c.addr}</small></div>
                            <div style="display:flex; gap:10px;"><button onclick="edit(${idx})">✏️</button><button onclick="del(${idx})">🗑️</button></div>
                        </div>`;
                    });
                }
            });
        }
    }

    function save() {
        const n = document.getElementById('f-name').value, a = document.getElementById('f-addr').value, 
              ph = document.getElementById('f-phone').value, city = document.getElementById('f-city').value,
              idx = parseInt(document.getElementById('f-idx').value);
        if(!n || !a) return alert("Заполни поля!");
        let obj = {name:n, addr:a, phone:ph, city:city};
        if(idx > -1) clients[idx] = obj; else clients.push(obj);
        localStorage.setItem('cl_v149', JSON.stringify(clients));
        closeModal(); render();
    }

    function add() {
        const c = clients[document.getElementById('f-select').value];
        tasks.push({id: Date.now(), n: c.name, a: c.addr, city: c.city, ph: c.phone});
        localStorage.setItem('tk_v149', JSON.stringify(tasks));
        closeModal(); render();
    }

    function delTask(id) { tasks = tasks.filter(t => t.id !== id); localStorage.setItem('tk_v149', JSON.stringify(tasks)); render(); }
    function done(id) { 
        let t = tasks.find(x => x.id === id); archive.push(t); tasks = tasks.filter(x => x.id !== id);
        localStorage.setItem('tk_v149', JSON.stringify(tasks)); localStorage.setItem('ar_v149', JSON.stringify(archive)); render();
    }
    function edit(i) {
        const c = clients[i]; document.getElementById('f-idx').value = i;
        document.getElementById('f-name').value = c.name; document.getElementById('f-phone').value = c.phone;
        document.getElementById('f-addr').value = c.addr; document.getElementById('f-city').value = c.city;
        openModal('win-client');
    }
    function del(i) { if(confirm("Удалить?")) { clients.splice(i,1); localStorage.setItem('cl_v149', JSON.stringify(clients)); render(); } }
    function clickPlus() {
        if(tab === 'clients') { openModal('win-client'); } 
        else { document.getElementById('f-select').innerHTML = clients.map((c, i) => `<option value="${i}">[${c.city}] ${c.name}</option>`).join(''); openModal('win-order'); }
    }

    render();
</script>
</body>
</html>
